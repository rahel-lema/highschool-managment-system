<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bense School Login</title>
    <link rel="stylesheet" href="login-styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>Bense Secondary High School</h1>
            <p class="subtitle">Login Form</p>

            <div class="mode-toggle">
                <button type="button" id="studentBtn" class="mode-btn active" onclick="switchMode('student')">Student</button>
                <button type="button" id="staffBtn" class="mode-btn" onclick="switchMode('staff')">Staff</button>
            </div>

            <div id="loginMessage" class="login-message" style="display:none;"></div>

            <form onsubmit="handleLogin(event)">
                <label id="usernameLabel" for="username">Student ID / Username</label>
                <input id="username" type="text" required>

                <label for="password">Password</label>
                <input id="password" type="password" required>

                <button type="submit" class="login-button">Login</button>
            </form>
        </div>
    </div>

    <script src="login-script.js?v=20260414-2"></script>
</body>
</html>
